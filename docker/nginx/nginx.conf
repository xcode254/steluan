# ============================================================
# Nginx config — reverse proxy + TLS + security headers
# ============================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ───────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # ── Rate limiting ─────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Redirect HTTP → HTTPS ─────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS server ──────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name steluan.co.ke www.steluan.co.ke;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY always;
    add_header X-Content-Type-Options    nosniff always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob: *.unsplash.com *.supabase.co; connect-src 'self' *.supabase.co;" always;

    # ── Auth endpoints — strict rate limit ───────────────────
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://app:3000;
      include /etc/nginx/proxy_params;
    }

    # ── API — standard rate limit ─────────────────────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass http://app:3000;
      include /etc/nginx/proxy_params;
    }

    # ── Static assets — aggressive caching ───────────────────
    location /_next/static/ {
      proxy_pass http://app:3000;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Everything else → Next.js ─────────────────────────────
    location / {
      proxy_pass http://app:3000;
      include /etc/nginx/proxy_params;
    }
  }
}
