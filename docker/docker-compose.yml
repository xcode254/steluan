# ============================================================
# Steluan LTD — Docker Compose
# Self-hosted stack: Next.js app + Nginx reverse proxy
# Supabase runs separately (Cloud or its own docker stack)
# ============================================================

version: "3.9"

services:

  # ── Next.js application ──────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: steluan-app:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:                      production
      NEXT_PUBLIC_SUPABASE_URL:      ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY:     ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_APP_URL:           ${NEXT_PUBLIC_APP_URL}
    networks:
      - steluan_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx reverse proxy + TLS termination ────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    networks:
      - steluan_net
    depends_on:
      - app

  # ── Self-hosted Supabase ──────────────────────────────────────
  # Not included here — run the official Supabase docker stack
  # separately (see docs/SUPABASE_CLOUD_SETUP.md, self-hosted
  # section) and point NEXT_PUBLIC_SUPABASE_URL at it.

volumes:
  nginx_cache:

networks:
  steluan_net:
    driver: bridge
